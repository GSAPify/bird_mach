apiVersion: apps/v1
    kind: CronJob
    metadata:
      name: mach-cleanup
      namespace: mach
      labels:
        app: mach
        component: cleanup
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: cleanup
      template:
        metadata:
          labels:
            app: mach
            component: cleanup
        spec:
          containers:
          - name: cleanup
            image: mach/cleanup:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
