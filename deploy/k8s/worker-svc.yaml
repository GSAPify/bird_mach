apiVersion: apps/v1
    kind: Service
    metadata:
      name: mach-worker-svc
      namespace: mach
      labels:
        app: mach
        component: worker-svc
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: worker-svc
      template:
        metadata:
          labels:
            app: mach
            component: worker-svc
        spec:
          containers:
          - name: worker-svc
            image: mach/worker-svc:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
