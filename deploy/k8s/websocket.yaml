apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: mach-websocket
      namespace: mach
      labels:
        app: mach
        component: websocket
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: websocket
      template:
        metadata:
          labels:
            app: mach
            component: websocket
        spec:
          containers:
          - name: websocket
            image: mach/websocket:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
