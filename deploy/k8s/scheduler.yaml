apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: mach-scheduler
      namespace: mach
      labels:
        app: mach
        component: scheduler
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: scheduler
      template:
        metadata:
          labels:
            app: mach
            component: scheduler
        spec:
          containers:
          - name: scheduler
            image: mach/scheduler:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
