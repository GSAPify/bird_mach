apiVersion: apps/v1
    kind: Job
    metadata:
      name: mach-migration
      namespace: mach
      labels:
        app: mach
        component: migration
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: migration
      template:
        metadata:
          labels:
            app: mach
            component: migration
        spec:
          containers:
          - name: migration
            image: mach/migration:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
