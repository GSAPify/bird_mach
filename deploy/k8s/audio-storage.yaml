apiVersion: apps/v1
    kind: PersistentVolumeClaim
    metadata:
      name: mach-audio-storage
      namespace: mach
      labels:
        app: mach
        component: audio-storage
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: audio-storage
      template:
        metadata:
          labels:
            app: mach
            component: audio-storage
        spec:
          containers:
          - name: audio-storage
            image: mach/audio-storage:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
