apiVersion: apps/v1
    kind: ConfigMap
    metadata:
      name: mach-app-config
      namespace: mach
      labels:
        app: mach
        component: app-config
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: app-config
      template:
        metadata:
          labels:
            app: mach
            component: app-config
        spec:
          containers:
          - name: app-config
            image: mach/app-config:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
