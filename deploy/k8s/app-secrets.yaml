apiVersion: apps/v1
    kind: Secret
    metadata:
      name: mach-app-secrets
      namespace: mach
      labels:
        app: mach
        component: app-secrets
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: app-secrets
      template:
        metadata:
          labels:
            app: mach
            component: app-secrets
        spec:
          containers:
          - name: app-secrets
            image: mach/app-secrets:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
