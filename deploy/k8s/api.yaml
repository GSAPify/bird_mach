apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: mach-api
      namespace: mach
      labels:
        app: mach
        component: api
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: api
      template:
        metadata:
          labels:
            app: mach
            component: api
        spec:
          containers:
          - name: api
            image: mach/api:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
