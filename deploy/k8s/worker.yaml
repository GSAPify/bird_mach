apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: mach-worker
      namespace: mach
      labels:
        app: mach
        component: worker
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: worker
      template:
        metadata:
          labels:
            app: mach
            component: worker
        spec:
          containers:
          - name: worker
            image: mach/worker:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
