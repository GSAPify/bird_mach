apiVersion: apps/v1
    kind: Ingress
    metadata:
      name: mach-api-ingress
      namespace: mach
      labels:
        app: mach
        component: api-ingress
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: api-ingress
      template:
        metadata:
          labels:
            app: mach
            component: api-ingress
        spec:
          containers:
          - name: api-ingress
            image: mach/api-ingress:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
