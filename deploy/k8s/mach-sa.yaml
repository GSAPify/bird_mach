apiVersion: apps/v1
    kind: ServiceAccount
    metadata:
      name: mach-mach-sa
      namespace: mach
      labels:
        app: mach
        component: mach-sa
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: mach
          component: mach-sa
      template:
        metadata:
          labels:
            app: mach
            component: mach-sa
        spec:
          containers:
          - name: mach-sa
            image: mach/mach-sa:latest
            ports:
            - containerPort: 8000
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
